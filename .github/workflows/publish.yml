name: Publish to Maven Central

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override snapshot version. Default: 0.0.10-SNAPSHOT'
        required: false

jobs:
  snapshot:
    if: (github.event_name == 'push' && github.ref_name == 'master') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Set snapshot version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: printf 'VERSION=%s\n' "${INPUT_VERSION:-0.0.10-SNAPSHOT}" >> "$GITHUB_ENV"
      - name: Build
        run: ./gradlew build --no-configuration-cache --no-daemon --stacktrace
      - name: Publish snapshot
        run: >-
          ./gradlew
          :webgpu-ktypes:publishToMavenCentral
          :webgpu-ktypes-descriptors:publishToMavenCentral
          :webgpu-ktypes-web:publishToMavenCentral
          --no-configuration-cache
          --no-daemon
          --stacktrace
          -PreleaseVersion="${VERSION}"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Extract version from tag
        run: printf 'VERSION=%s\n' "${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build
        run: ./gradlew build --no-configuration-cache --no-daemon --stacktrace
      - name: Publish release
        run: >-
          ./gradlew
          :webgpu-ktypes:publishToMavenCentral
          :webgpu-ktypes-descriptors:publishToMavenCentral
          :webgpu-ktypes-web:publishToMavenCentral
          --no-configuration-cache
          --no-daemon
          --stacktrace
          -PreleaseVersion="${VERSION}"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
